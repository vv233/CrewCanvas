name: Companion Windows Installer

# Builds the self-contained Windows installer (setup.exe) for the local
# Companion. Run manually (workflow_dispatch) to get an artifact, or push a
# `companion-v*` tag to also attach it to a GitHub Release.

on:
  workflow_dispatch:
  push:
    tags:
      - 'companion-v*'

permissions:
  contents: write # needed to attach the installer to a release

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: companion
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install companion dependencies
        run: npm ci --omit=dev --no-audit --no-fund

      - name: Bundle portable Node
        # Windows node.exe is self-contained, so copying the runner's node.exe
        # makes the installer work without Node pre-installed on the user's PC.
        run: |
          New-Item -ItemType Directory -Force -Path windows\node | Out-Null
          Copy-Item (Get-Command node).Source windows\node\node.exe -Force

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" windows\installer.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: crewcanvas-companion-setup
          path: companion/windows/Output/crewcanvas-companion-setup.exe
          if-no-files-found: error

      - name: Attach installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: companion/windows/Output/crewcanvas-companion-setup.exe
